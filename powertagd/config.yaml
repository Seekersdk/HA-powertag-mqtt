name: PowerTagd
version: "1.2.0"
slug: powertagd
description: "Schneider Electric PowerTag energy monitor to MQTT bridge with Home Assistant auto-discovery"
url: "https://github.com/SeekersDK/HA-powertag-mqtt"
arch:
  - amd64
startup: services
boot: auto
init: false
uart: true
hassio_api: true
hassio_role: default
options:
  device: "/dev/ttyACM0"
schema:
  device: str
  mqtt_broker: str?
  mqtt_user: str?
  mqtt_password: str?
